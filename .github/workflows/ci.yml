name: CI

on:
  pull_request:
  workflow_call:
    inputs:
      rust-versions:
        description: >-
          JSON array of Rust versions for the quality/audit matrix.
          Default (empty) runs the full matrix: ["1.92", "1.93"].
        type: string
        default: ""
      test-matrix:
        description: >-
          JSON array of objects for the unit-test matrix with per-version
          coverage thresholds. Default runs the full matrix.
        type: string
        default: ""
      integration-matrix:
        description: >-
          JSON array of objects for the integration-test matrix.
          Default (empty) runs the full matrix with per-version ports.
        type: string
        default: ""
      run-security:
        description: >-
          Run security scanner jobs (set to 'false' to skip).
        type: string
        default: "true"
      run-release:
        description: >-
          Run release gate checks (set to 'false' to skip).
        type: string
        default: "true"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  quality:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-quality.yml@v1.5
    with:
      language: rust
      versions: ${{ inputs.rust-versions || '["1.92", "1.93"]' }}

  test:
    name: "test / unit / ${{ matrix.rust-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ fromJSON(inputs.test-matrix || '[
            {"rust-version":"1.92","coverage-lines":"99","coverage-regions":"99"},
            {"rust-version":"1.93","coverage-lines":"100","coverage-regions":"100"}
          ]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust-version }}
          components: llvm-tools

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run tests with coverage
        # yamllint disable-line rule:line-length
        run: >-
          cargo llvm-cov
          --features examples
          --fail-under-lines ${{ matrix.coverage-lines }}
          --fail-under-regions ${{ matrix.coverage-regions }}

  audit:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-audit.yml@v1.5
    with:
      language: rust
      versions: ${{ inputs.rust-versions || '["1.92", "1.93"]' }}

  integration-tests:
    name: "test / integration / ${{ matrix.rust-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ fromJSON(inputs.integration-matrix || '[
            {"rust-version":"1.92","project-suffix":"1-92","qm1-rest-port":"9485","qm2-rest-port":"9486","qm1-mq-port":"1456","qm2-mq-port":"1457"},
            {"rust-version":"1.93","project-suffix":"1-93","qm1-rest-port":"9487","qm2-rest-port":"9488","qm1-mq-port":"1458","qm2-mq-port":"1459"}
          ]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust-version }}

      - name: Setup MQ environment
        # yamllint disable-line rule:line-length
        uses: wphillipmoore/mq-rest-admin-dev-environment/.github/actions/setup-mq@main
        with:
          project-name: "mqrest-rust-${{ matrix.project-suffix }}"
          qm1-rest-port: ${{ matrix.qm1-rest-port }}
          qm2-rest-port: ${{ matrix.qm2-rest-port }}
          qm1-mq-port: ${{ matrix.qm1-mq-port }}
          qm2-mq-port: ${{ matrix.qm2-mq-port }}

      - name: Run integration tests
        env:
          MQ_REST_BASE_URL: >-
            https://localhost:${{ matrix.qm1-rest-port }}/ibmmq/rest/v2
          MQ_REST_BASE_URL_QM2: >-
            https://localhost:${{ matrix.qm2-rest-port }}/ibmmq/rest/v2
        run: cargo test --features integration,examples

  security:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-security.yml@v1.5
    with:
      language: rust
      run-standards: ${{ inputs.run-release != 'false' }}
      run-security: ${{ inputs.run-security != 'false' }}
    permissions:
      contents: read
      security-events: write

  release:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-release.yml@v1.5
    with:
      language: rust
      run-release: ${{ inputs.run-release != 'false' }}
